<div class="min-h-screen bg-gradient-to-b from-black via-gray-900 to-black text-white pt-32 px-6 flex flex-col items-center">

  <!-- HEADER -->
  <div class="text-center mb-16">
    <h1 class="text-5xl font-bold mb-4 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
      Universal File Converter
    </h1>
    <p class="text-gray-400">Convert documents instantly</p>
  </div>

  <!-- UPLOAD SCREEN -->
  <div *ngIf="currentStep === 'UPLOAD'" class="w-full max-w-6xl">

    <div class="grid md:grid-cols-2 gap-10">

      <!-- Upload -->
      <div class="bg-white/5 border border-white/10 rounded-2xl p-10">

        <h2 class="mb-6">Upload File</h2>

        <div
          class="border-2 border-dashed p-10 text-center cursor-pointer"
          (drop)="onDrop($event)"
          (dragover)="onDragOver($event)"
          (click)="fileInput.click()"
        >
          📤 Upload File
          <input #fileInput type="file" (change)="onFileSelected($event)" hidden>
        </div>

        <p *ngIf="selectedFile">✔ {{selectedFile.name}}</p>

      </div>

      <!-- Format -->
      <div class="bg-white/5 border border-white/10 rounded-2xl p-10">

        <h2 class="mb-6">Convert To</h2>

        <div class="relative" #dropdownContainer>

          <input
            [(ngModel)]="searchText"
            (input)="filterFormats()"
            (click)="toggleDropdown()"
            placeholder="Search format"
            class="w-full p-3 bg-black"
          >

          <div *ngIf="dropdownOpen" class="bg-gray-900 mt-2 max-h-40 overflow-y-auto">

            <div
              *ngFor="let format of filteredFormats"
              (click)="selectFormat(format)"
              class="p-2 hover:bg-blue-500 cursor-pointer"
            >
              {{format}}
            </div>

          </div>

        </div>

        <p *ngIf="selectedFormat">Selected: {{selectedFormat}}</p>

      </div>

    </div>

    <div class="text-center mt-10">
      <button (click)="convertFile()" class="bg-blue-600 px-8 py-3 rounded">
        Convert File
      </button>
    </div>

  </div>

  <!-- LOADING -->
  <div *ngIf="currentStep === 'CONVERTING'" class="mt-10">
    ⏳ Converting...
  </div>

  <!-- DONE -->
  <div *ngIf="currentStep === 'DONE'" class="mt-10 text-center">

    <h2>✅ Done</h2>

    <button (click)="downloadFile()" class="bg-green-600 px-6 py-3 mt-4">
      Download
    </button>

    <button (click)="startOver()" class="bg-gray-600 px-6 py-3 mt-4 ml-4">
      Again
    </button>

  </div>

</div>
